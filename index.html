<!DOCTYPE html>
<html>
  
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Data</title>
  
<style>

  table {
    border-collapse: collapse;
    width: 100%;
    display: block;
    overflow-x: auto;
  }

  th, td {
    padding: 8px;
    text-align: left;
  }

  th {
    background-color: #ddd;
  }

  button {
    margin: 2px;
    padding: 8px;
  }

  input, select, button {
    width: 100%;
    max-width: 400px;
    padding: 8px;
    margin-bottom: 8px;
    box-sizing: border-box;
  }

</style>

</head>

<body>

<h2>Input Data</h2>

<input id="nama" placeholder="Nama Kepala Keluarga"><br><br>
<input id="alamat" placeholder="Alamat"><br><br>
<input id="jumlah" placeholder="Jumlah Anggota"><br><br>

<!-- 🔽 TAMBAHAN BARU -->
<input id="nik" placeholder="NIK"><br><br>
<input id="no_kk" placeholder="No KK"><br><br>

<label>Agama</label><br>
<select id="agama">
  <option>Islam</option>
  <option>Kristen</option>
  <option>Katolik</option>
  <option>Hindu</option>
  <option>Buddha</option>
</select><br><br>

<label>Apakah Sedang Hamil</label><br>
<select id="hamil">
  <option value="Tidak">Tidak</option>
  <option value="Ya">Ya</option>
</select><br><br>

<label>Apakah Lansia (Umur > 60 tahun)</label><br>
<select id="lansia">
  <option value="Tidak">Tidak</option>
  <option value="Ya">Ya</option>
</select><br><br>

<input id="no_registrasi" placeholder="No Registrasi"><br><br>
<input id="dasawisma" placeholder="Dasawisma"><br><br>

<select id="jabatan_pkk">
  <option>Ketua</option>
  <option>Sekretaris</option>
  <option>Bendahara</option>
  <option>POKJA 1</option>
  <option>POKJA 2</option>
  <option>POKJA 3</option>
  <option>POKJA 4</option>
  <option>Anggota</option>
</select><br><br>

<select id="status_rumah">
  <option value="Milik">Milik</option>
  <option value="Sewa">Sewa</option>
</select><br><br>

<select id="pendidikan">
  <option value="SD">SD</option>
  <option value="SMP">SMP</option>
  <option value="SMA">SMA</option>
  <option value="D3">D3</option>
  <option value="S1">S1</option>
</select><br><br>

<select id="kesehatan">
  <option value="Sehat">Sehat</option>
  <option value="Tidak Sehat">Tidak Sehat</option>
</select><br><br>

<button id="btnSimpan" onclick="tambah()">Simpan</button>
<button onclick="batalEdit()">Batal</button>

<h2>Semua Data</h2>

<button onclick="loadData()">Semua</button>
<button onclick="filterLansia()">Lansia</button>
<button onclick="filterHamil()">Ibu Hamil</button>
<button onclick="logout()">Logout</button>

<div id="adminMenu"></div>
<div id="userPanel" style="display:none; margin-top:20px;">

  <h2>Tambah User</h2>

  <input id="newUsername" placeholder="Username"><br><br>

  <input id="newPassword" type="password" placeholder="Password"><br><br>

  <select id="newRole">
    <option value="operator">Operator</option>
    <option value="admin">Admin</option>
  </select><br><br>

  <button onclick="tambahUser()">
    Tambah User
  </button>

</div>

<p id="loading" style="display:none; color: blue;">
  ⏳ Loading data...
</p>

<h3>Pencarian Data</h3>

<input
  type="text"
  id="search"
  placeholder="Cari nama / NIK..."
  oninput="filterData()"
/>

<select id="filterLansia" onchange="filterData()">
  <option value="">Semua Lansia</option>
  <option value="Ya">Lansia</option>
  <option value="Tidak">Bukan Lansia</option>
</select>

<select id="filterHamil" onchange="filterData()">
  <option value="">Semua Hamil</option>
  <option value="Ya">Hamil</option>
  <option value="Tidak">Tidak Hamil</option>
</select>

<br><br>

<table border="1" id="tabel">
  <thead>
   <tr>
    <th>Nama</th>
    <th>NIK</th>
    <th>No KK</th>
    <th>Alamat</th>
    <th>Jumlah</th>
    <th>Status Rumah</th>
    <th>Pendidikan</th>
    <th>Kesehatan</th>
    <th>Agama</th>
    <th>Hamil</th>
    <th>Lansia</th>
    <th>No Reg</th>
    <th>Dasawisma</th>
    <th>PKK</th>
    <th>Aksi</th>
  </tr>
  </thead>
  <tbody id="hasil"></tbody>
</table>

<script>
async function tambahUser() {

  try {

    let data = {
      username: document.getElementById("newUsername").value,
      password: document.getElementById("newPassword").value,
      role: document.getElementById("newRole").value
    };

    if (!data.username || !data.password) {

      alert("Username dan password wajib diisi");

      return;
    }

    document.getElementById("loading").style.display = "block";

    let res = await fetch(BASE_URL + "/tambah-user", {
      method: "POST",
      headers: {
        "Content-Type":"application/json"
      },
      credentials: "include",
      body: JSON.stringify(data)
    });

    if (res.status === 401) {

      document.getElementById("loading").style.display = "none";

      alert("Session habis, login ulang");

      window.location.href = "login.html";

      return;
    }

    let hasil = await res.text();

    alert(hasil);

    document.getElementById("newUsername").value = "";
    document.getElementById("newPassword").value = "";
    document.getElementById("newRole").value = "operator";

    document.getElementById("loading").style.display = "none";

  } catch(err) {

    document.getElementById("loading").style.display = "none";

    alert("Gagal terhubung ke server");

    console.log(err);

  }

}
const BASE_URL = ("https://aplikasi-warga-production.up.railway.app")

let editId = null;
let semuaData = [];
let currentUser = null;
init();

async function init() {

  let ok = await cekUser();

  if (!ok) return;


  await loadData();

}

async function cekUser() {

  try {

    let res = await fetch(BASE_URL + "/me", {
      credentials: "include"
    });

    if (res.status === 401) {

      window.location.href = "login.html";

      return false;
    }

    let user = await res.json();

    currentUser = user;

    if (user.role === "admin") {

      document.getElementById("userPanel").style.display = "block";

      document.getElementById("adminMenu").innerHTML = `
        <button onclick="lihatLogs()">
          Audit Log
        </button>
      `;
    }

    return true;

  } catch(err) {

    alert("Gagal terhubung ke server");

    console.log(err);

    return false;

  }

}

async function tambah() {

  try {

    let data = {
      nama: document.getElementById("nama").value,
      alamat: document.getElementById("alamat").value,
      jumlah_anggota:
        parseInt(document.getElementById("jumlah").value) || 0,
      status_rumah: document.getElementById("status_rumah").value,
      pendidikan: document.getElementById("pendidikan").value,
      kesehatan: document.getElementById("kesehatan").value,
      nik: document.getElementById("nik").value,
      no_kk: document.getElementById("no_kk").value,
      agama: document.getElementById("agama").value,
      hamil: document.getElementById("hamil").value,
      lansia: document.getElementById("lansia").value,
      no_registrasi: document.getElementById("no_registrasi").value,
      dasawisma: document.getElementById("dasawisma").value,
      jabatan_pkk: document.getElementById("jabatan_pkk").value,
    };

    if (!data.nama || !data.alamat || !data.nik) {

      alert("Data wajib diisi");

      return;
    }

    if (isNaN(data.nik)) {

      alert("NIK harus angka");

      return;
    }

    if (data.jumlah_anggota < 0) {

    alert("Jumlah anggota tidak valid");

    return;
  }

    document.getElementById("btnSimpan").disabled = true;

    document.getElementById("loading").style.display = "block";

    if (editId) {

      // MODE EDIT
      let res = await fetch(BASE_URL + "/update/" + editId, {
        method: "PUT",
        headers: {
          "Content-Type":"application/json"
        },
        body: JSON.stringify(data),
        credentials: "include"
      });

      if (res.status === 401) {

        document.getElementById("loading").style.display = "none";

        document.getElementById("btnSimpan").disabled = false;

        alert("Session habis, login ulang");

        window.location.href = "login.html";

        return;
      }

      alert("Data diupdate");

      batalEdit();


    } else {

      // MODE TAMBAH
      let res = await fetch(BASE_URL + "/tambah", {
        method: "POST",
        headers: {
          "Content-Type":"application/json"
        },
        body: JSON.stringify(data),
        credentials: "include"
      });

      if (res.status === 401) {

        document.getElementById("loading").style.display = "none";

        document.getElementById("btnSimpan").disabled = false;

        alert("Session habis, login ulang");

        window.location.href = "login.html";

        return;
      }

      alert("Tersimpan");

      batalEdit();

    }

    await loadData();

    document.getElementById("loading").style.display = "none";

    document.getElementById("btnSimpan").disabled = false;

  } catch(err) {

    document.getElementById("loading").style.display = "none";

    document.getElementById("btnSimpan").disabled = false;

    alert("Gagal terhubung ke server");

    console.log(err);

  }

}

async function loadData() {

  try {

    document.getElementById("loading").style.display = "block";

    let res = await fetch(BASE_URL + "/data", {
      credentials: "include"
    });

    if (res.status === 401) {

      document.getElementById("loading").style.display = "none";

      alert("Session habis");

      window.location.href = "login.html";

      return;
    }

    let data = await res.json();

    semuaData = data;

    tampilkanTabel(data);

    document.getElementById("loading").style.display = "none";

  } catch(err) {

    document.getElementById("loading").style.display = "none";

    alert("Gagal terhubung ke server");

    console.log(err);

  }

}

function filterData() {

  let keyword = document
    .getElementById("search")
    .value
    .toLowerCase();

  let filterLansia =
    document.getElementById("filterLansia").value;

  let filterHamil =
    document.getElementById("filterHamil").value;

  let hasilFilter = semuaData.filter(d => {

    let cocokSearch =
   String(d.nama || "")
    .toLowerCase()
    .includes(keyword)
    
    ||

   String(d.nik || "")
    .toLowerCase()
    .includes(keyword);

    let cocokLansia =
      !filterLansia ||
      d.lansia === filterLansia;

    let cocokHamil =
      !filterHamil ||
      d.hamil === filterHamil;

    return cocokSearch &&
           cocokLansia &&
           cocokHamil;
  });

  tampilkanTabel(hasilFilter);
}

async function hapusData(id) {

  try {

    if (!confirm("Yakin mau hapus?")) return;

    document.getElementById("loading").style.display = "block";

    let res = await fetch(BASE_URL + "/hapus/" + id, {
      method: "DELETE",
      credentials: "include"
    });

    if (res.status === 401) {

      document.getElementById("loading").style.display = "none";

      alert("Session habis, login ulang");

      window.location.href = "login.html";

      return;
    }

    alert("Data dihapus");

    await loadData();

    document.getElementById("loading").style.display = "none";

  } catch(err) {

    document.getElementById("loading").style.display = "none";

    alert("Gagal menghapus data");

    console.log(err);

  }

}

function escapeHtml(text) {

  if (!text) return "";

 return String(text)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function tampilkanTabel(data) {
  let hasil = document.getElementById("hasil");
  hasil.innerHTML = "";

  data.forEach(d => {
    let tr = document.createElement("tr");

   tr.innerHTML = `
    <td>${escapeHtml(d.nama)}</td>
    <td>${escapeHtml(d.nik)}</td>
    <td>${escapeHtml(d.no_kk)}</td>
    <td>${escapeHtml(d.alamat)}</td>
    <td>${escapeHtml(d.jumlah_anggota)}</td>
    <td>${escapeHtml(d.status_rumah)}</td>
    <td>${escapeHtml(d.pendidikan)}</td>
    <td>${escapeHtml(d.kesehatan)}</td>
    <td>${escapeHtml(d.agama)}</td>
    <td>${escapeHtml(d.hamil)}</td>
    <td>${escapeHtml(d.lansia)}</td>
    <td>${escapeHtml(d.no_registrasi)}</td>
    <td>${escapeHtml(d.dasawisma)}</td>
    <td>${escapeHtml(d.jabatan_pkk)}</td>
    <td>
      <button onclick="editData(
  '${d.id}',

  '${String(d.nama)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")}',

  '${String(d.nik)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")}',

  '${String(d.no_kk)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")}',

  '${String(d.alamat)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")}',

  '${String(d.jumlah_anggota)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")}',

  '${String(d.status_rumah)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")}',

  '${String(d.pendidikan)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")}',

  '${String(d.kesehatan)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")}',

  '${String(d.agama)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")}',

  '${String(d.hamil)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")}',

  '${String(d.lansia)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")}',

  '${String(d.no_registrasi)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")}',

  '${String(d.dasawisma)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")}',

  '${String(d.jabatan_pkk)
    .replace(/\\/g, "\\\\")
    .replace(/'/g, "\\'")}'
)">Edit</button>

    ${
        currentUser?.role === "admin"
        ? `<button onclick="hapusData('${d.id}')">Hapus</button>`
         : ``
}
  </td>
`;

    hasil.appendChild(tr);
  });
}

function editData(
  id, nama, nik, no_kk, alamat, jumlah,
  rumah, pendidikan, kesehatan,
  agama, hamil, lansia, no_registrasi, dasawisma, jabatan_pkk
) {
  editId = id;

  document.getElementById("nama").value = nama;
  document.getElementById("nik").value = nik;
  document.getElementById("no_kk").value = no_kk;
  document.getElementById("alamat").value = alamat;
  document.getElementById("jumlah").value = jumlah;

  document.getElementById("status_rumah").value = rumah;
  document.getElementById("pendidikan").value = pendidikan;
  document.getElementById("kesehatan").value = kesehatan;

  document.getElementById("agama").value = agama;
  document.getElementById("hamil").value = hamil;
  document.getElementById("lansia").value = lansia;

  document.getElementById("no_registrasi").value = no_registrasi;
  document.getElementById("dasawisma").value = dasawisma;
  document.getElementById("jabatan_pkk").value = jabatan_pkk;

  document.getElementById("btnSimpan").innerText = "Update";
}

function batalEdit() {

  editId = null;

  document.getElementById("nama").value = "";
  document.getElementById("alamat").value = "";
  document.getElementById("jumlah").value = "";

  document.getElementById("pendidikan").value = "SD";
  document.getElementById("kesehatan").value = "Sehat";
  document.getElementById("status_rumah").value = "Milik";

  document.getElementById("nik").value = "";
  document.getElementById("no_kk").value = "";

  document.getElementById("agama").value = "Islam";
  document.getElementById("hamil").value = "Tidak";
  document.getElementById("lansia").value = "Tidak";

  document.getElementById("no_registrasi").value = "";
  document.getElementById("dasawisma").value = "";

  document.getElementById("jabatan_pkk").value = "Anggota";

  document.getElementById("btnSimpan").innerText = "Simpan";

  document.getElementById("btnSimpan").disabled = false;

}

async function filterLansia() {

  try {

    document.getElementById("loading").style.display = "block";

    let res = await fetch(BASE_URL + "/lansia", {
      credentials: "include"
    });

    if (res.status === 401) {

      document.getElementById("loading").style.display = "none";

      alert("Session habis");

      window.location.href = "login.html";

      return;
    }

    let data = await res.json();

    semuaData = data;

    tampilkanTabel(data);

    document.getElementById("loading").style.display = "none";

  } catch(err) {

    document.getElementById("loading").style.display = "none";

    alert("Gagal terhubung ke server");

    console.log(err);

  }

}

async function filterHamil() {

  try {

    document.getElementById("loading").style.display = "block";

    let res = await fetch(BASE_URL + "/hamil", {
      credentials: "include"
    });

    if (res.status === 401) {

      document.getElementById("loading").style.display = "none";

      alert("Session habis");

      window.location.href = "login.html";

      return;
    }

    let data = await res.json();

    semuaData = data;

    tampilkanTabel(data);

    document.getElementById("loading").style.display = "none";

  } catch(err) {

    document.getElementById("loading").style.display = "none";

    alert("Gagal terhubung ke server");

    console.log(err);

  }

}

async function lihatLogs() {

  try {

    document.getElementById("loading").style.display = "block";

    let res = await fetch(BASE_URL + "/logs", {
      credentials: "include"
    });

    if (res.status === 401) {

      document.getElementById("loading").style.display = "none";

      alert("Session habis, login ulang");

      window.location.href = "login.html";

      return;
    }

    let data = await res.json();

    let hasil = document.getElementById("hasil");

    hasil.innerHTML = "";

    data.forEach(log => {

      let tr = document.createElement("tr");

      tr.innerHTML = `
        <td colspan="15">
          <b>${escapeHtml(log.username)}</b>
          (${escapeHtml(log.role)})
          melakukan
          <b>${escapeHtml(log.aksi)}</b>
          terhadap
          <b>${escapeHtml(log.target)}</b>
          <br>
          ${escapeHtml(log.waktu)}
        </td>
      `;

      hasil.appendChild(tr);

    });

    document.getElementById("loading").style.display = "none";

  } catch(err) {

    document.getElementById("loading").style.display = "none";

    alert("Gagal terhubung ke server");

    console.log(err);

  }

}

async function logout() {

  try {

    document.getElementById("loading").style.display = "block";

    let res = await fetch(BASE_URL + "/logout", {
      method: "POST",
      credentials: "include"
    });

    if (res.status === 401) {

      document.getElementById("loading").style.display = "none";

      alert("Session habis, login ulang");

      document.getElementById("loading").style.display = "none";

      window.location.href = "login.html";

      return;
    }
    document.getElementById("loading").style.display = "none";
    window.location.href = "login.html";

  } catch(err) {

    document.getElementById("loading").style.display = "none";

    alert("Gagal logout");

    console.log(err);

  }

}

</script>

</body>
</html>
